services:
  backend:
    build:
      context: ./backend
    container_name: msme-credit-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/artifacts:/app/artifacts

  dashboard:
    build:
      context: ./dashboard
    container_name: msme-credit-dashboard
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
